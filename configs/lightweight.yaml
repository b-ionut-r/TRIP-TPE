# TRIP-TPE Lightweight Configuration
# ===================================
# For rapid prototyping and CI/CD testing.
# Reduced model size and training budget.

transformer:
  num_layers: 2
  embed_dim: 128
  num_heads: 4
  ff_dim: 512
  dropout: 0.1
  max_seq_len: 100
  hp_input_dim: 8
  obj_input_dim: 1
  # All refinements enabled — same as full config
  use_dimension_queries: true
  dim_query_layers: 2
  n_beta_components: 3

training:
  batch_size: 16
  learning_rate: 5.0e-4
  weight_decay: 1.0e-2
  num_epochs: 10
  warmup_steps: 100
  max_grad_norm: 1.0
  fp16: false
  curriculum: false
  num_workers: 0
  pin_memory: false
  save_every: 5
  eval_every: 2
  patience: 5

region_proposal:
  n_warmup_trials: 3
  requery_interval: 5
  confidence_level: 0.9
  min_region_fraction: 0.05
  max_region_fraction: 0.8
  trust_factor: 0.8
  trust_decay: 0.99
  min_trust_factor: 0.3
  adaptive_trust: true
  adaptive_trust_target_coverage: 0.8
  adaptive_trust_sensitivity: 5.0
  adaptive_trust_gamma: 0.15

tpe:
  n_startup_trials: 0
  n_ei_candidates: 16
  multivariate: true
  group: true

device: cpu
checkpoint_dir: checkpoints_light
log_dir: logs_light
