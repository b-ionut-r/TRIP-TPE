# TRIP-TPE Default Configuration
# ================================
# Aligned with project research specifications:
#   - ~10M parameter Transformer (4 layers, 256 embed_dim)
#   - FP16 training for GTX 1650 Ti (4GB VRAM) compatibility
#   - Gamma = 0.15 (Watanabe 2023 optimal range)
#
# v2: Guided sampling mode (no hard space constraints).
#     Loss rebalanced: stronger tightness + mode accuracy loss for
#     focused Beta distributions suitable for direct sampling.

transformer:
  num_layers: 4
  embed_dim: 256
  num_heads: 8
  ff_dim: 1024
  dropout: 0.1
  max_seq_len: 200
  activation: gelu
  hp_input_dim: 16
  obj_input_dim: 1
  region_output_mode: beta
  # P1: DETR-style cross-attention dimension queries
  use_dimension_queries: true
  dim_query_layers: 2
  # P2: Mixture-of-Betas components (3 = captures multimodal optima)
  n_beta_components: 3

training:
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-2
  num_epochs: 100
  warmup_steps: 1000
  max_grad_norm: 1.0
  fp16: true
  curriculum: true
  curriculum_start_len: 10
  curriculum_end_len: 100
  curriculum_warmup_epochs: 20
  num_workers: 4
  pin_memory: true
  save_every: 10
  eval_every: 5
  patience: 15

loss:
  # Rebalanced for guided sampling mode (v2):
  #   - Coverage reduced from 2.0→1.0: we're sampling, not bounding, so
  #     moderate coverage is sufficient (wrong bounds don't matter as much).
  #   - Tightness increased from 0.3→0.8: tighter Beta distributions produce
  #     more focused samples, directly improving guided exploration.
  #   - Mode accuracy (NEW, 0.5): penalizes when the Beta distribution's peak
  #     is far from the target region center. This is the single most impactful
  #     term for guided mode — it ensures samples cluster near the optimum.
  #   - KL slightly increased (0.01→0.02): prevents overconfident predictions
  #     that would collapse sampling diversity.
  lambda_bound: 1.0
  lambda_cover: 1.0
  lambda_tight: 0.8
  lambda_kl: 0.02
  lambda_mode: 0.5

region_proposal:
  # Mode: "guided" (recommended) or "constrained" (legacy).
  #   guided: Transformer samples seed trials, TPE runs on FULL space.
  #   constrained: Transformer restricts TPE's search space (legacy, risky).
  mode: guided

  # Guided mode parameters (strong Transformer involvement):
  n_guided_exploration: 0.3     # 30% of budget (float=fraction, int=absolute)
  inject_rate: 0.4              # Post-warmup injection rate
  inject_decay: 0.99            # Decay per trial
  min_inject_rate: 0.10         # Floor for injection rate
  exploration_temperature: 0.15 # Sharper model confidence (0=exact, 1=uniform)
  # Burst re-centering: periodic consecutive Transformer samples
  burst_requery_interval: 20    # Every N TPE trials, fire a burst
  burst_size: 2                 # Consecutive Transformer samples per burst

  # Legacy constrained mode parameters (only used if mode=constrained):
  n_warmup_trials: 5
  requery_interval: 10
  confidence_level: 0.9
  min_region_fraction: 0.05
  max_region_fraction: 0.8
  trust_factor: 0.8
  trust_decay: 0.995
  min_trust_factor: 0.3
  beta_blend_weight: 0.5
  adaptive_trust: true
  adaptive_trust_target_coverage: 0.8
  adaptive_trust_sensitivity: 5.0
  adaptive_trust_gamma: 0.15

tpe:
  n_startup_trials: 0
  n_ei_candidates: 24
  gamma_strategy: default
  gamma_value: 0.15
  multivariate: true
  group: true
  constant_liar: false

evaluation:
  budgets:
    - 25
    - 50
    - 100
  n_seeds: 20
  benchmarks:
    - hpob
    - yahpo
    - synthetic
  baselines:
    - random
    - tpe
    - gp_ei
    - smac3
    - bohb
    - hebo
    - pfns4bo
  metric: normalized_regret
  output_dir: results

data_generation:
  mode: real
  n_prefixes_per_trajectory: 15
  hpob_augments: 10
  yahpo_augments: 5
  yahpo_samples_per_instance: 500
  mix_synthetic: 0.1

device: auto
checkpoint_dir: checkpoints
log_dir: logs
